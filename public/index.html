<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Flash Docs</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<!-- TOPBAR -->

<aside class="sidebar">


    <!-- kiri -->

    <div class="logo">

        <h1>

            Flash Docs

        </h1>


        <div class="download-menu">

            <button id="downloadBtn">

                File

            </button>


            <div class="download-dropdown">

                <div
                class="download-item"
                id="newDoc">

                New

                </div>


                <div
                class="download-item"
                id="openFile">

                Open File

                </div>


                <div
                id="downloadPdf"
                class="download-item">

                Save as PDF

                </div>


                <div
                id="downloadDocx"
                class="download-item">

                Save as Word (.docx)

                </div>


                <div
                class="download-item"
                id="saveCopy">

                Save a Copy

                </div>

                <input
                type="file"
                id="fileInput"
                hidden
                accept=".txt"/>

            </div>

        </div>

    </div>


    <!-- tengah -->

    <div class="top-middle">

        <input
        type="text"
        id="username"
        placeholder="Masukkan nama">


        <button id="joinBtn">

            Masuk

        </button>

    </div>


    <!-- activity -->

    <div class="activity-section">

        <p id="typing-status">

            Tidak ada aktivitas

        </p>


        <div class="activity-menu">

            <button id="activityBtn">

                Activity ▼

            </button>


            <div class="activity-dropdown">

                <ul id="activity-list">

                </ul>

            </div>

        </div>

    </div>


    <!-- kanan -->

    <div class="top-right">

        <p id="online">

            Online: 0

        </p>

    </div>


</aside>


<!-- EDITOR -->

<main class="editor-area">

    <div class="editor-header">

        <h2>

            Keyboard is automatically saved

        </h2>

    </div>


    <textarea
    id="editor"
    placeholder="Mulai mengetik...">

    </textarea>

</main>

</div>


<script src="script.js"></script>

</body>

</html>
